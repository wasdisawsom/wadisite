<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="/images/eepyscug.png" type="image"/>
        <title>wawa</title>
        <script src="/header/js/logix.js"></script>
        <script src="/wawa/js/logix.js"></script> 
        <link id="styles" rel="stylesheet" href="/wawa/css/styles.css">
        <link id="theme" rel="stylesheet" href="/wawa/css/darkmode.css">
    </head>
    <body>
        <main>
            <input type="radio" id="encode" name="actionSelection" value="encode" checked>
            <label id="encodel"class="text" for="encode" >&lt;encode&gt;</label>
            <br>
            <input type="radio" id="decode" name="actionSelection" value="decode" >
            <label id="decodel"class="text" for="decode" >&lt;decode&gt;</label>

            <p id="instruction" class="text">Enter words to convert to wawa.</p>

            <textarea id="input" class="input" rows="8" cols="60" autofocus></textarea>
            <br>
            <button type="button" id="enter" class="box" class="text">Convert!</button>
            <br><br>
            <button type="button" id="clear" class="box" class="text">Clear boxes!</button>
            <br>
            <p id="showResult" class="text">Converted text:</p>
            <button type="button" id="copyBtn" class="box" class="text">Copy to clipboard.</button>
            <br><br>
            <textarea id="output" class="input" rows="8" cols="60" readonly></textarea>

            <br>
            <input type="radio" id="darkMode" name="themeSelection" value="dark" checked>
            <label id="darkMode1" class="text" for="darkMode">[Dark mode]</label>
            <br>
            <input type="radio" id="lightMode" name="themeSelection" value="light" >
            <label id="lightMode1" class="text" for="lightMode">[Light mode]</label>
        </main>
    </body>
</html>
